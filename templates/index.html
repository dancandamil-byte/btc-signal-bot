<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Signal Bot</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>₿ BTC Signal Bot</h1>
            <div class="status" id="status">Connecting...</div>
        </header>

        <div class="price-bar glass">
            <span class="price-label">BTC/USDT</span>
            <span class="price-value" id="price">--</span>
        </div>

        <div class="timeframe-tabs">
            <button class="tab active" data-tf="1m">1m</button>
            <button class="tab" data-tf="5m">5m</button>
            <button class="tab" data-tf="15m">15m</button>
        </div>

        <div class="grid">
            <div class="card glass" id="signal-card">
                <h2>Signal</h2>
                <div class="signal-badge" id="signal-badge">--</div>
                <div class="confidence">
                    <span>Confidence:</span>
                    <span id="confidence">--%</span>
                </div>
                <div class="scores">
                    <div class="score-item">
                        <span>Technical</span>
                        <span id="tech-score">--</span>
                    </div>
                    <div class="score-item">
                        <span>On-Chain</span>
                        <span id="onchain-score">--</span>
                    </div>
                    <div class="score-item">
                        <span>Sentiment</span>
                        <span id="sentiment-score">--</span>
                    </div>
                </div>
            </div>

            <div class="card glass chart-card">
                <h2>Price History</h2>
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="card glass indicators-card">
            <h2>Technical Indicators</h2>
            <div class="indicators-grid" id="indicators-grid"></div>
        </div>

        <div class="grid">
            <div class="card glass">
                <h2>On-Chain</h2>
                <div class="data-list" id="onchain-data">
                    <div class="data-item"><span>Hashrate</span><span id="hashrate">--</span></div>
                    <div class="data-item"><span>Fees (sat/vB)</span><span id="fees">--</span></div>
                    <div class="data-item"><span>Difficulty Adj</span><span id="difficulty">--</span></div>
                </div>
            </div>
            <div class="card glass">
                <h2>Sentiment</h2>
                <div class="data-list" id="sentiment-data">
                    <div class="data-item"><span>Fear & Greed</span><span id="fng-value">--</span></div>
                    <div class="data-item"><span>Label</span><span id="fng-label">--</span></div>
                    <div class="data-item"><span>Signal</span><span id="fng-signal">--</span></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
